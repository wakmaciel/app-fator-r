<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F1B2D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fator R">

  <link rel="apple-touch-icon" href="icon-fator-r.png">
  <link rel="manifest" href="manifest.json">
  <title>Fator R</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0F1B2D;
      --bg-card: #16243B;
      --bg-card-2: #1C2D47;
      --bg-input: #13203A;
      --border: #26395A;
      --teal: #22C497;
      --teal-soft: rgba(34, 196, 151, 0.14);
      --coral: #E96A57;
      --coral-soft: rgba(233, 106, 87, 0.14);
      --gold: #DDAA47;
      --gold-soft: rgba(221, 170, 71, 0.14);
      --text: #EDF1F7;
      --text-dim: #90A2BD;
      --text-faint: #5A7090;
      --radius: 16px;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
    }

    body {
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
      background: linear-gradient(180deg, #0F1B2D 80%, rgba(15, 27, 45, 0));
    }

    #topbar h1 {
      font-family: var(--font-display);
      font-size: 21px;
      margin: 0;
      letter-spacing: -.01em;
    }

    #topbar .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 2px 16px 100px;
      -webkit-overflow-scrolling: touch;
    }

    #tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      background: rgba(22, 36, 59, 0.92);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 8px 4px calc(env(safe-area-inset-bottom) + 6px);
      z-index: 30;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0 2px;
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: var(--font-body);
      font-size: 10.5px;
      font-weight: 600;
    }

    .tab-btn svg {
      width: 22px;
      height: 22px;
      stroke: var(--text-faint);
      fill: none;
      stroke-width: 1.8;
    }

    .tab-btn.active {
      color: var(--teal);
    }

    .tab-btn.active svg {
      stroke: var(--teal);
    }

    h2.section-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      margin: 22px 0 10px;
      color: var(--text);
      letter-spacing: .01em;
    }

    h2.section-title:first-child {
      margin-top: 8px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .card.tight {
      padding: 12px 14px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .kpi {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 13px 14px;
      border: 1px solid var(--border);
    }

    .kpi .label {
      font-size: 10.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }

    .kpi .value {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      margin-top: 5px;
    }

    .kpi .value.coral {
      color: var(--coral);
    }

    .kpi .value.teal {
      color: var(--teal);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .badge-iii {
      background: var(--teal-soft);
      color: var(--teal);
    }

    .badge-v {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .badge-mei {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .field {
      margin-bottom: 13px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field .hint {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 5px;
      line-height: 1.4;
    }

    .field input[type=number],
    .field input[type=text],
    .field select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 13px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 15.5px;
      -webkit-appearance: none;
      appearance: none;
    }

    .field select {
      font-family: var(--font-body);
      font-size: 14.5px;
    }

    .field input:focus,
    .field select:focus {
      outline: 2px solid var(--teal);
      outline-offset: 1px;
    }

    .seg {
      display: flex;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }

    .seg button {
      flex: 1;
      border: none;
      background: none;
      color: var(--text-dim);
      padding: 9px 0;
      border-radius: 8px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
    }

    .seg button.on {
      background: var(--bg-card-2);
      color: var(--text);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row .l {
      font-size: 13px;
      color: var(--text-dim);
    }

    .row .v {
      font-family: var(--font-mono);
      font-size: 14.5px;
      font-weight: 600;
      text-align: right;
    }

    .row .v.coral {
      color: var(--coral);
    }

    .row .v.teal {
      color: var(--teal);
    }

    .row .v.dim {
      color: var(--text-faint);
      font-weight: 500;
    }

    .row.big .v {
      font-size: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: none;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14.5px;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-primary {
      background: var(--teal);
      color: #06241B;
    }

    .btn-secondary {
      background: var(--bg-card-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .btn-ghost {
      background: none;
      color: var(--text-dim);
      border: 1px dashed var(--border);
    }

    .month-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 4px;
      border-bottom: 1px solid var(--border);
    }

    .month-list-item:last-child {
      border-bottom: none;
    }

    .month-list-item .mk {
      font-family: var(--font-display);
      font-size: 14.5px;
      font-weight: 700;
    }

    .month-list-item .mv {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .month-list-item .right {
      text-align: right;
    }

    .chip-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      justify-content: flex-end;
    }

    .empty {
      text-align: center;
      padding: 40px 10px;
      color: var(--text-faint);
      font-size: 13.5px;
    }

    .note {
      font-size: 11.5px;
      color: var(--text-faint);
      line-height: 1.5;
      margin-top: 10px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .loan-card {
      background: var(--bg-card-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .loan-card .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .loan-card .top .name {
      font-weight: 700;
      font-size: 14px;
    }

    .x-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 18px;
      padding: 2px 6px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    #gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0 0;
    }

    .gauge-pct {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 700;
      margin-top: -58px;
    }

    .gauge-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      margin-bottom: 6px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text-faint);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="topbar">
      <h1 id="topbar-title">Fator R</h1>
      <div class="sub" id="topbar-sub">carregando…</div>
    </div>
    <div id="content">
      <div class="loading">carregando seus dados…</div>
    </div>
    <nav id="tabbar"></nav>
  </div>

  <script>
    /* ============================== CONSTANTES ============================== */
    const ANEXO3 = [[0, 0.06, 0], [180000.01, 0.112, 9360], [360000.01, 0.135, 17640], [720000.01, 0.16, 35640], [1800000.01, 0.21, 125640], [3600000.01, 0.33, 648000]];
    const ANEXO5 = [[0, 0.155, 0], [180000.01, 0.18, 4500], [360000.01, 0.195, 9900], [720000.01, 0.205, 17100], [1800000.01, 0.23, 62100], [3600000.01, 0.305, 540000]];
    const MES_ABR = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const MES_EXT = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

    const SEED_PARAMS = {
      salarioMinimo: 1621.00, tetoInss: 8475.55, aliqInss: 0.11, fatorRMeta: 0.28,
      honorarioContador: 149.90, dasMei: 80.90
    };
    const SEED_LOANS = [
      { id: 'l1', nome: 'Capital de Giro - Banco X', valorContratado: 20000, nParcelas: 24, valorParcela: 670, parcelasPagas: 3 }
    ];
    function mkMonth(key, regime, faturamento, proLabore, dasPago) {
      return { key, regime, faturamento, proLabore, outrasDespesas: 0, dasPago: dasPago ?? null, lucroDistribuidoOverride: null };
    }
    const SEED_MONTHS = [
      mkMonth('2025-05', 'MEI', 580.65, 0), mkMonth('2025-06', 'MEI', 6000, 0), mkMonth('2025-07', 'MEI', 6000, 0),
      mkMonth('2025-08', 'MEI', 6000, 0), mkMonth('2025-09', 'MEI', 9000, 0), mkMonth('2025-10', 'MEI', 9937.49, 0),
      mkMonth('2025-11', 'MEI', 10089.27, 0), mkMonth('2025-12', 'MEI', 9571.43, 0),
      mkMonth('2026-01', 'ME', 9000, 0), mkMonth('2026-02', 'ME', 0, 9266), mkMonth('2026-03', 'ME', 0, 9266),
      mkMonth('2026-04', 'ME', 9100.01, 2756.96), mkMonth('2026-05', 'ME', 9000, 2520, 540.00),
    ];

    /* ============================== STORAGE ============================== */
    async function loadJSON(key, fallback) {
      try {
        const res = await window.storage.get(key, false);
        if (res && res.value) return JSON.parse(res.value);
        return fallback;
      } catch (e) { return fallback; }
    }
    async function saveJSON(key, obj) {
      try { await window.storage.set(key, JSON.stringify(obj), false); }
      catch (e) { console.error('falha ao salvar', key, e); }
    }

    /* ============================== ESTADO ============================== */
    let STATE = { months: [], params: {}, loans: [] };
    let ACTIVE_TAB = 'inicio';
    let LANCAR_KEY = null;

    async function initState() {
      STATE.months = await loadJSON('fatorr:months', JSON.parse(JSON.stringify(SEED_MONTHS)));
      STATE.params = await loadJSON('fatorr:params', JSON.parse(JSON.stringify(SEED_PARAMS)));
      STATE.loans = await loadJSON('fatorr:loans', JSON.parse(JSON.stringify(SEED_LOANS)));
      LANCAR_KEY = STATE.months[STATE.months.length - 1].key;
    }
    async function persist() {
      await Promise.all([
        saveJSON('fatorr:months', STATE.months),
        saveJSON('fatorr:params', STATE.params),
        saveJSON('fatorr:loans', STATE.loans),
      ]);
    }

    /* ============================== UTILS ============================== */
    const fmtBRL = n => (isFinite(n) ? n : 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const fmtPct = n => ((isFinite(n) ? n : 0) * 100).toFixed(1).replace('.', ',') + '%';
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function monthLabel(key) {
      const [y, m] = key.split('-').map(Number);
      return MES_ABR[m - 1] + '/' + String(y).slice(2);
    }
    function monthLabelExt(key) {
      const [y, m] = key.split('-').map(Number);
      return MES_EXT[m - 1] + ' / ' + y;
    }
    function nextKey(key) {
      let [y, m] = key.split('-').map(Number);
      m += 1; if (m > 12) { m = 1; y += 1; }
      return y + '-' + String(m).padStart(2, '0');
    }
    function bracketLookup(table, rbt12) {
      let row = table[0];
      for (const r of table) { if (rbt12 >= r[0]) row = r; else break; }
      return row;
    }
    function loansTotalAtivo(loans) {
      return loans.filter(l => (l.parcelasPagas || 0) < (l.nParcelas || 0)).reduce((s, l) => s + (Number(l.valorParcela) || 0), 0);
    }

    /* ============================== MOTOR DE CÁLCULO ============================== */
    function computeMonth(months, idx, params, loansTotal) {
      const m = months[idx];
      const preceding = idx;
      let rbt12, folha12;
      if (preceding === 0) {
        rbt12 = m.faturamento * 12; folha12 = m.proLabore * 12;
      } else if (preceding <= 11) {
        let sf = 0, sp = 0;
        for (let i = 0; i < idx; i++) { sf += months[i].faturamento; sp += months[i].proLabore; }
        rbt12 = (sf / preceding) * 12; folha12 = (sp / preceding) * 12;
      } else {
        let sf = 0, sp = 0;
        for (let i = idx - 12; i < idx; i++) { sf += months[i].faturamento; sp += months[i].proLabore; }
        rbt12 = sf; folha12 = sp;
      }
      const fatorR = rbt12 ? folha12 / rbt12 : 0;
      const anexo = fatorR >= params.fatorRMeta ? 'III' : 'V';
      let dasEstimado = 0, aliqEf = 0, aliqNom = 0, pd = 0;
      if (m.regime === 'ME') {
        const table = anexo === 'III' ? ANEXO3 : ANEXO5;
        const row = bracketLookup(table, rbt12);
        aliqNom = row[1]; pd = row[2];
        aliqEf = rbt12 ? (rbt12 * aliqNom - pd) / rbt12 : 0;
        dasEstimado = m.faturamento * aliqEf;
      }
      const dasUsado = m.regime === 'MEI' ? (m.dasPago ?? params.dasMei) : (m.dasPago ?? dasEstimado);
      const inss = m.regime === 'ME' ? Math.min(m.proLabore, params.tetoInss) * params.aliqInss : 0;
      const contador = params.honorarioContador;
      const totalSaida = m.proLabore + dasUsado + inss + contador + loansTotal + (m.outrasDespesas || 0);
      const lucroDisponivel = m.faturamento - totalSaida;
      const lucroDistribuido = (m.lucroDistribuidoOverride != null) ? m.lucroDistribuidoOverride : Math.max(lucroDisponivel, 0);
      const saldoCaixa = lucroDisponivel - lucroDistribuido;
      const proLaboreSugerido = m.faturamento * params.fatorRMeta;
      return {
        rbt12, folha12, fatorR, anexo, aliqNom, pd, aliqEf, dasEstimado, dasUsado, inss, contador, totalSaida,
        lucroDisponivel, lucroDistribuido, saldoCaixa, proLaboreSugerido
      };
    }
    function computeAll() {
      const loansTotal = loansTotalAtivo(STATE.loans);
      return STATE.months.map((m, idx) => computeMonth(STATE.months, idx, STATE.params, loansTotal));
    }

    /* ============================== GAUGE SVG ============================== */
    function gaugeSVG(fatorR, meta, anexo) {
      const cx = 120, cy = 118, r = 96, scaleMax = 0.6;
      const pt = (rad, ang) => { const a = ang * Math.PI / 180; return [cx + rad * Math.cos(a), cy - rad * Math.sin(a)]; };
      const angFor = v => { const t = Math.max(0, Math.min(1, v / scaleMax)); return 180 - t * 180; };
      const [tx1, ty1] = pt(r - 13, angFor(meta));
      const [tx2, ty2] = pt(r + 9, angFor(meta));
      const pct = Math.max(0, Math.min(100, (fatorR / scaleMax) * 100));
      const color = anexo === 'III' ? 'var(--teal)' : 'var(--coral)';
      return `<svg viewBox="0 0 240 132" width="240" height="132">
    <path d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" stroke="#243A5E" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" stroke="${color}" stroke-width="15" fill="none"
          stroke-linecap="round" pathLength="100" stroke-dasharray="${pct} 100"/>
    <line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="#9DB0CC" stroke-width="2"/>
    <text x="${cx}" y="${cy + 14}" text-anchor="middle" fill="#5A7090" font-size="10" font-family="Inter">meta 28%</text>
  </svg>`;
    }

    /* ============================== TABS / NAV ============================== */
    const TABS = [
      { id: 'inicio', label: 'Início', icon: '<path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9"/>' },
      { id: 'lancar', label: 'Lançar', icon: '<rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 8v8M8 12h8"/>' },
      { id: 'retirar', label: 'Retirar', icon: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>' },
      { id: 'historico', label: 'Histórico', icon: '<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>' },
      { id: 'ajustes', label: 'Ajustes', icon: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/>' },
    ];
    function renderTabbar() {
      const bar = document.getElementById('tabbar');
      bar.innerHTML = TABS.map(t => `
    <button class="tab-btn ${ACTIVE_TAB === t.id ? 'active' : ''}" data-tab="${t.id}">
      <svg viewBox="0 0 24 24">${t.icon}</svg>
      <span>${t.label}</span>
    </button>`).join('');
      bar.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => { ACTIVE_TAB = b.dataset.tab; renderAll(); }));
    }

    function setTopbar(title, sub) {
      document.getElementById('topbar-title').textContent = title;
      document.getElementById('topbar-sub').textContent = sub;
    }

    /* ============================== TAB: INÍCIO ============================== */
    let chartRef = null;
    function renderInicio() {
      const all = computeAll();
      const lastIdx = STATE.months.length - 1;
      const last = STATE.months[lastIdx];
      const lastC = all[lastIdx];

      const year = last.key.slice(0, 4);
      const yearIdxs = STATE.months.map((m, i) => i).filter(i => STATE.months[i].key.slice(0, 4) === year);
      const sum = f => yearIdxs.reduce((s, i) => s + f(STATE.months[i], all[i]), 0);
      const totFat = sum(m => m.faturamento);
      const totPL = sum(m => m.proLabore);
      const totLucro = sum((m, c) => c.lucroDistribuido);
      const totImp = sum((m, c) => c.dasUsado + c.inss + c.contador + (m.outrasDespesas || 0));

      setTopbar('Fator R', `Painel • ${monthLabelExt(last.key)}`);

      const isME = last.regime === 'ME';
      document.getElementById('content').innerHTML = `
    <h2 class="section-title">Resumo de ${year}</h2>
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Faturamento</div><div class="value">${fmtBRL(totFat)}</div></div>
      <div class="kpi"><div class="label">Pró-labore</div><div class="value">${fmtBRL(totPL)}</div></div>
      <div class="kpi"><div class="label">Lucro distribuído</div><div class="value teal">${fmtBRL(totLucro)}</div></div>
      <div class="kpi"><div class="label">Impostos + desp.</div><div class="value coral">${fmtBRL(totImp)}</div></div>
    </div>

    <h2 class="section-title">Fator R — ${monthLabel(last.key)}</h2>
    <div class="card" style="text-align:center;">
      ${isME ? `
        <div id="gauge-wrap">
          ${gaugeSVG(lastC.fatorR, STATE.params.fatorRMeta, lastC.anexo)}
          <div class="gauge-pct">${fmtPct(lastC.fatorR)}</div>
          <div class="gauge-sub">
            <span class="badge ${lastC.anexo === 'III' ? 'badge-iii' : 'badge-v'}">Anexo ${lastC.anexo}</span>
          </div>
        </div>
      ` : `
        <div style="padding:18px 0;">
          <span class="badge badge-mei">MEI — sem Fator R</span>
          <div class="note" style="text-align:left;margin-top:12px;">Enquanto MEI, não há Anexo III/V — apenas o DAS-MEI fixo.</div>
        </div>
      `}
    </div>

    <h2 class="section-title">Faturamento × Lucro disponível</h2>
    <div class="card">
      <canvas id="chart-inicio" height="170"></canvas>
    </div>

    <div class="note">Cálculos de Fator R, RBT12 e DAS seguem a metodologia oficial do PGDAS-D. Confirme sempre os valores de imposto com seu contador.</div>
  `;

      const N = Math.min(8, STATE.months.length);
      const slice = STATE.months.slice(-N);
      const sliceC = all.slice(-N);
      const ctx = document.getElementById('chart-inicio');
      if (chartRef) chartRef.destroy();
      chartRef = new Chart(ctx, {
        type: 'line',
        data: {
          labels: slice.map(m => monthLabel(m.key)),
          datasets: [
            { label: 'Faturamento', data: sliceC.map((c, i) => slice[i].faturamento), borderColor: '#5B8DEF', backgroundColor: 'transparent', tension: .3, pointRadius: 3 },
            { label: 'Lucro disp.', data: sliceC.map(c => c.lucroDisponivel), borderColor: '#22C497', backgroundColor: 'transparent', tension: .3, pointRadius: 3 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#90A2BD', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#5A7090', font: { size: 10 } }, grid: { color: '#1E2F4D' } },
            y: { ticks: { color: '#5A7090', font: { size: 10 } }, grid: { color: '#1E2F4D' } }
          }
        }
      });
    }

    /* ============================== TAB: LANÇAR ============================== */
    function renderLancar() {
      if (!STATE.months.find(m => m.key === LANCAR_KEY)) LANCAR_KEY = STATE.months[STATE.months.length - 1].key;
      const idx = STATE.months.findIndex(m => m.key === LANCAR_KEY);
      const m = STATE.months[idx];
      const loansTotal = loansTotalAtivo(STATE.loans);
      const c = computeMonth(STATE.months, idx, STATE.params, loansTotal);
      const isLast = idx === STATE.months.length - 1;

      setTopbar('Lançar mês', monthLabelExt(m.key));

      const options = STATE.months.map(mm => `<option value="${mm.key}" ${mm.key === m.key ? 'selected' : ''}>${monthLabel(mm.key)} ${mm.regime === 'MEI' ? '(MEI)' : ''}</option>`).join('');

      document.getElementById('content').innerHTML = `
    <h2 class="section-title">Selecionar mês</h2>
    <div class="card tight">
      <select id="sel-month">${options}</select>
    </div>

    <h2 class="section-title">Regime</h2>
    <div class="card tight">
      <div class="seg">
        <button data-regime="MEI" class="${m.regime === 'MEI' ? 'on' : ''}">MEI</button>
        <button data-regime="ME" class="${m.regime === 'ME' ? 'on' : ''}">ME / Simples</button>
      </div>
      <div class="note">MEI não tem Fator R nem pró-labore — só paga o DAS-MEI fixo.</div>
    </div>

    <h2 class="section-title">Dados do mês</h2>
    <div class="card">
      <div class="field">
        <label>Faturamento do mês</label>
        <input type="number" inputmode="decimal" id="f-fat" value="${m.faturamento}">
      </div>
      ${m.regime === 'ME' ? `
        <div class="field">
          <label>Pró-labore retirado (sugestão: ${fmtBRL(c.proLaboreSugerido)})</label>
          <input type="number" inputmode="decimal" id="f-pl" value="${m.proLabore}">
        </div>
        <div class="field">
          <label>DAS informado pelo contador (em branco = usar estimativa)</label>
          <input type="number" inputmode="decimal" id="f-das" value="${m.dasPago ?? ''}" placeholder="${fmtBRL(c.dasEstimado)} (estimado)">
        </div>
      ` : `
        <div class="field">
          <label>DAS-MEI pago (em branco = usar o valor padrão)</label>
          <input type="number" inputmode="decimal" id="f-das" value="${m.dasPago ?? ''}" placeholder="${fmtBRL(STATE.params.dasMei)} (padrão)">
        </div>
      `}
      <div class="field">
        <label>Outras despesas do mês</label>
        <input type="number" inputmode="decimal" id="f-outras" value="${m.outrasDespesas || 0}">
      </div>
    </div>

    <h2 class="section-title">Resultado calculado</h2>
    <div class="card">
      ${m.regime === 'ME' ? `
        <div class="row"><div class="l">RBT12 (12 meses anteriores)</div><div class="v dim">${fmtBRL(c.rbt12)}</div></div>
        <div class="row"><div class="l">Folha pró-labore (12m anteriores)</div><div class="v dim">${fmtBRL(c.folha12)}</div></div>
        <div class="row"><div class="l">Fator R oficial</div><div class="v">${fmtPct(c.fatorR)}</div></div>
        <div class="row"><div class="l">Anexo aplicável</div><div class="v"><span class="badge ${c.anexo === 'III' ? 'badge-iii' : 'badge-v'}">Anexo ${c.anexo}</span></div></div>
        <div class="row"><div class="l">DAS usado no cálculo</div><div class="v">${fmtBRL(c.dasUsado)}</div></div>
        <div class="row"><div class="l">INSS sobre pró-labore (11%)</div><div class="v">${fmtBRL(c.inss)}</div></div>
      ` : `
        <div class="row"><div class="l">DAS-MEI usado</div><div class="v">${fmtBRL(c.dasUsado)}</div></div>
      `}
      <div class="row"><div class="l">Honorários contábeis</div><div class="v dim">${fmtBRL(c.contador)}</div></div>
      <div class="row"><div class="l">Parcela(s) de empréstimo</div><div class="v dim">${fmtBRL(loansTotal)}</div></div>
      <div class="divider"></div>
      <div class="row big"><div class="l">Total de saídas</div><div class="v">${fmtBRL(c.totalSaida)}</div></div>
      <div class="row big"><div class="l">Lucro disponível</div><div class="v ${c.lucroDisponivel < 0 ? 'coral' : 'teal'}">${fmtBRL(c.lucroDisponivel)}</div></div>
    </div>

    <h2 class="section-title">Distribuição de lucro</h2>
    <div class="card">
      <div class="field">
        <label>Lucro distribuído este mês (em branco = distribuir tudo)</label>
        <input type="number" inputmode="decimal" id="f-dist" value="${m.lucroDistribuidoOverride ?? ''}" placeholder="${fmtBRL(Math.max(c.lucroDisponivel, 0))} (automático)">
      </div>
      <div class="row"><div class="l">Saldo retido em caixa</div><div class="v">${fmtBRL(c.saldoCaixa)}</div></div>
    </div>

    ${isLast ? `<button class="btn btn-secondary" id="btn-next-month">+ Adicionar ${monthLabel(nextKey(m.key))}</button>` : ''}
  `;

      document.getElementById('sel-month').addEventListener('change', e => { LANCAR_KEY = e.target.value; renderLancar(); });
      document.querySelectorAll('[data-regime]').forEach(b => b.addEventListener('click', async () => {
        m.regime = b.dataset.regime;
        if (m.regime === 'MEI') m.proLabore = 0;
        await persist(); renderLancar();
      }));
      const bindNum = (id, field, allowNull) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', async () => {
          const raw = el.value;
          if (allowNull && raw === '') { m[field] = null; }
          else { m[field] = raw === '' ? 0 : parseFloat(raw); }
          await persist();
          renderLancar();
        });
      };
      bindNum('f-fat', 'faturamento', false);
      bindNum('f-pl', 'proLabore', false);
      bindNum('f-das', 'dasPago', true);
      bindNum('f-outras', 'outrasDespesas', false);
      bindNum('f-dist', 'lucroDistribuidoOverride', true);

      const nextBtn = document.getElementById('btn-next-month');
      if (nextBtn) nextBtn.addEventListener('click', async () => {
        const nk = nextKey(m.key);
        const newMonth = mkMonth(nk, m.regime, 0, 0);
        STATE.months.push(newMonth);
        LANCAR_KEY = nk;
        await persist();
        renderLancar();
      });
    }

    /* ============================== TAB: RETIRAR ============================== */
    let simFat = 0, simOutras = 0;
    function renderRetirar() {
      setTopbar('Quanto posso retirar?', 'Simulação rápida');
      const lastIdx = STATE.months.length - 1;
      const lastMonth = STATE.months[lastIdx];
      const virtualMonths = STATE.months.concat([mkMonth('sim', lastMonth.regime, simFat, simFat * STATE.params.fatorRMeta)]);
      const vIdx = virtualMonths.length - 1;
      const loansTotal = loansTotalAtivo(STATE.loans);
      const c = computeMonth(virtualMonths, vIdx, STATE.params, loansTotal);
      const totalFixo = c.dasUsado + c.inss + c.contador + loansTotal + simOutras;
      const lucroDisp = simFat - c.proLaboreSugerido - totalFixo;
      const totalRetirar = c.proLaboreSugerido + Math.max(lucroDisp, 0);

      document.getElementById('content').innerHTML = `
    <h2 class="section-title">Informe o faturamento</h2>
    <div class="card tight">
      <input type="number" inputmode="decimal" id="sim-fat" value="${simFat || ''}" placeholder="R$ 0,00"
        style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;
        padding:14px;color:var(--gold);font-family:var(--font-mono);font-size:21px;font-weight:600;">
    </div>

    <h2 class="section-title">Custos fixos considerados</h2>
    <div class="card">
      <div class="row"><div class="l">Honorários contábeis</div><div class="v dim">${fmtBRL(c.contador)}</div></div>
      <div class="row"><div class="l">Parcela(s) de empréstimo</div><div class="v dim">${fmtBRL(loansTotal)}</div></div>
      <div class="field" style="margin-top:10px;margin-bottom:0;">
        <label>Outras despesas estimadas</label>
        <input type="number" inputmode="decimal" id="sim-outras" value="${simOutras || ''}" placeholder="0,00">
      </div>
    </div>

    <h2 class="section-title">Fator R e impostos (estimados)</h2>
    <div class="card">
      <div class="row"><div class="l">RBT12 real (com este mês simulado)</div><div class="v dim">${fmtBRL(c.rbt12)}</div></div>
      <div class="row"><div class="l">Pró-labore sugerido (28%)</div><div class="v">${fmtBRL(c.proLaboreSugerido)}</div></div>
      <div class="row"><div class="l">Anexo estimado</div><div class="v"><span class="badge ${c.anexo === 'III' ? 'badge-iii' : 'badge-v'}">Anexo ${c.anexo}</span></div></div>
      <div class="row"><div class="l">INSS sobre pró-labore</div><div class="v">${fmtBRL(c.inss)}</div></div>
      <div class="row"><div class="l">DAS estimado</div><div class="v">${fmtBRL(c.dasUsado)}</div></div>
    </div>

    <h2 class="section-title">Resultado</h2>
    <div class="card">
      <div class="row"><div class="l">Total de compromissos fixos</div><div class="v">${fmtBRL(totalFixo)}</div></div>
      <div class="row"><div class="l">Lucro disponível</div><div class="v ${lucroDisp < 0 ? 'coral' : 'teal'}">${fmtBRL(lucroDisp)}</div></div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,#16332B,#16243B);border-color:#22C497;">
      <div class="row"><div class="l" style="font-weight:700;color:var(--text);">💰 Total disponível para retirar hoje</div></div>
      <div style="font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--teal);margin-top:2px;">${fmtBRL(totalRetirar)}</div>
      <div class="note" style="margin-top:10px;">
        ${lucroDisp < 0
          ? '⚠️ As despesas fixas e impostos estimados superam o faturamento informado. Revise custos antes de retirar valores extras.'
          : `✅ Você pode retirar este valor mantendo o Fator R ≥ ${fmtPct(STATE.params.fatorRMeta)} e as contas da empresa em dia.`}
      </div>
    </div>
  `;
      document.getElementById('sim-fat').addEventListener('input', e => { simFat = parseFloat(e.target.value) || 0; renderRetirar(); });
      document.getElementById('sim-outras').addEventListener('input', e => { simOutras = parseFloat(e.target.value) || 0; renderRetirar(); });
    }

    /* ============================== TAB: HISTÓRICO ============================== */
    function renderHistorico() {
      setTopbar('Histórico', `${STATE.months.length} meses desde a abertura`);
      const all = computeAll();
      const rows = STATE.months.map((m, i) => {
        const c = all[i];
        const badge = m.regime === 'MEI' ? `<span class="badge badge-mei">MEI</span>` :
          `<span class="badge ${c.anexo === 'III' ? 'badge-iii' : 'badge-v'}">Anexo ${c.anexo}</span>`;
        return `<div class="month-list-item" data-key="${m.key}">
      <div>
        <div class="mk">${monthLabel(m.key)}</div>
        <div class="mv">${fmtBRL(m.faturamento)}</div>
      </div>
      <div class="right">
        ${badge}
        <div class="mv">${m.regime === 'ME' ? fmtPct(c.fatorR) : ''}</div>
      </div>
    </div>`;
      }).reverse().join('');

      document.getElementById('content').innerHTML = `
    <h2 class="section-title">Todos os meses</h2>
    <div class="card tight">${rows || '<div class="empty">Nenhum mês cadastrado ainda.</div>'}</div>
    <div class="note">Toque em um mês para abrir e editar na aba Lançar.</div>
  `;
      document.querySelectorAll('.month-list-item').forEach(el => el.addEventListener('click', () => {
        LANCAR_KEY = el.dataset.key; ACTIVE_TAB = 'lancar'; renderAll();
      }));
    }

    /* ============================== TAB: AJUSTES ============================== */
    function renderAjustes() {
      setTopbar('Ajustes', 'Parâmetros e empréstimos');
      const p = STATE.params;
      document.getElementById('content').innerHTML = `
    <h2 class="section-title">Parâmetros gerais</h2>
    <div class="card">
      <div class="field"><label>Salário mínimo nacional</label><input type="number" id="p-sal" value="${p.salarioMinimo}"></div>
      <div class="field"><label>Teto do INSS</label><input type="number" id="p-teto" value="${p.tetoInss}"></div>
      <div class="field"><label>Alíquota INSS sobre pró-labore (%)</label><input type="number" id="p-aliqinss" value="${(p.aliqInss * 100).toFixed(2)}"></div>
      <div class="field"><label>Meta do Fator R (%)</label><input type="number" id="p-meta" value="${(p.fatorRMeta * 100).toFixed(2)}"></div>
      <div class="field"><label>Honorários contábeis (mensal)</label><input type="number" id="p-contador" value="${p.honorarioContador}"></div>
      <div class="field"><label>DAS-MEI fixo (serviços)</label><input type="number" id="p-dasmei" value="${p.dasMei}"></div>
    </div>

    <h2 class="section-title">Empréstimos</h2>
    <div id="loans-list">
      ${STATE.loans.map(l => {
        const restantes = Math.max((l.nParcelas || 0) - (l.parcelasPagas || 0), 0);
        const saldo = restantes * (l.valorParcela || 0);
        return `<div class="loan-card" data-id="${l.id}">
          <div class="top"><span class="name">${esc(l.nome) || 'Empréstimo'}</span><button class="x-btn" data-del="${l.id}">✕</button></div>
          <div class="field"><label>Nome</label><input type="text" data-loan="${l.id}" data-field="nome" value="${esc(l.nome)}"></div>
          <div class="two-col">
            <div class="field"><label>Nº parcelas</label><input type="number" data-loan="${l.id}" data-field="nParcelas" value="${l.nParcelas || 0}"></div>
            <div class="field"><label>Valor da parcela</label><input type="number" data-loan="${l.id}" data-field="valorParcela" value="${l.valorParcela || 0}"></div>
          </div>
          <div class="field"><label>Parcelas pagas</label><input type="number" data-loan="${l.id}" data-field="parcelasPagas" value="${l.parcelasPagas || 0}"></div>
          <div class="row"><div class="l">Saldo devedor estimado</div><div class="v dim">${fmtBRL(saldo)} (${restantes} restantes)</div></div>
        </div>`;
      }).join('') || '<div class="card empty">Nenhum empréstimo cadastrado.</div>'}
    </div>
    <button class="btn btn-ghost" id="btn-add-loan">+ Adicionar empréstimo</button>

    <h2 class="section-title">Dados</h2>
    <div class="card">
      <button class="btn btn-danger" id="btn-reset">Restaurar dados de exemplo</button>
      <div class="note">Isso substitui faturamento, pró-labore e empréstimos pelos dados originais do seu PGDAS-D. Não pode ser desfeito.</div>
    </div>
  `;

      const bindParam = (id, field, isPct) => document.getElementById(id).addEventListener('input', async e => {
        const v = parseFloat(e.target.value) || 0;
        p[field] = isPct ? v / 100 : v;
        await persist();
      });
      bindParam('p-sal', 'salarioMinimo', false);
      bindParam('p-teto', 'tetoInss', false);
      bindParam('p-aliqinss', 'aliqInss', true);
      bindParam('p-meta', 'fatorRMeta', true);
      bindParam('p-contador', 'honorarioContador', false);
      bindParam('p-dasmei', 'dasMei', false);

      document.querySelectorAll('[data-loan]').forEach(el => el.addEventListener('input', async () => {
        const loan = STATE.loans.find(l => l.id === el.dataset.loan);
        const f = el.dataset.field;
        loan[f] = (f === 'nome') ? el.value : (parseFloat(el.value) || 0);
        await persist();
      }));
      document.querySelectorAll('[data-del]').forEach(el => el.addEventListener('click', async () => {
        STATE.loans = STATE.loans.filter(l => l.id !== el.dataset.del);
        await persist(); renderAjustes();
      }));
      document.getElementById('btn-add-loan').addEventListener('click', async () => {
        STATE.loans.push({ id: 'l' + Date.now(), nome: 'Novo empréstimo', valorContratado: 0, nParcelas: 1, valorParcela: 0, parcelasPagas: 0 });
        await persist(); renderAjustes();
      });
      document.getElementById('btn-reset').addEventListener('click', async () => {
        if (!confirm('Restaurar todos os dados de exemplo? Isso substitui o que você já lançou.')) return;
        STATE.months = JSON.parse(JSON.stringify(SEED_MONTHS));
        STATE.params = JSON.parse(JSON.stringify(SEED_PARAMS));
        STATE.loans = JSON.parse(JSON.stringify(SEED_LOANS));
        LANCAR_KEY = STATE.months[STATE.months.length - 1].key;
        await persist(); ACTIVE_TAB = 'inicio'; renderAll();
      });
    }

    /* ============================== ROTEADOR ============================== */
    function renderAll() {
      renderTabbar();
      if (ACTIVE_TAB === 'inicio') renderInicio();
      else if (ACTIVE_TAB === 'lancar') renderLancar();
      else if (ACTIVE_TAB === 'retirar') renderRetirar();
      else if (ACTIVE_TAB === 'historico') renderHistorico();
      else if (ACTIVE_TAB === 'ajustes') renderAjustes();
    }

    (async function init() {
      await initState();
      renderAll();
    })();
  </script>
</body>

</html>
